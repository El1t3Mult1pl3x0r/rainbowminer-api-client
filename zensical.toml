# Zensical configuration — rainbowminer-api-client documentation
#
# Native TOML config format (recommended over mkdocs.yml for new projects).
# See https://zensical.org/docs/setup/basics/ for full reference.

[project]
site_name = "RainbowMiner API Client"
site_url = "https://el1t3mult1pl3x0r.github.io/rainbowminer-api-client/"
site_description = "A typed Python API client for RainbowMiner — monitor and control your multipool cryptominer from Python."

repo_name = "El1t3Mult1pl3x0r/rainbowminer-api-client"
repo_url = "https://github.com/El1t3Mult1pl3x0r/rainbowminer-api-client"
edit_uri = "blob/main/docs/"

copyright = "Copyright &copy; 2026 El1t3Mult1pl3x0r"

# Navigation
nav = [
    { "Home" = "index.md" },
    { "Getting started" = [
        { "Installation" = "getting-started/installation.md" },
        { "Quick start" = "getting-started/quick-start.md" },
    ] },
    { "Guide" = [
        { "Monitoring" = "guide/monitoring.md" },
        { "Control" = "guide/control.md" },
        { "Binary endpoints" = "guide/binary.md" },
        { "Error handling" = "guide/error-handling.md" },
        { "Sync / async parity" = "guide/sync-async-parity.md" },
    ] },
    { "API reference" = [
        { "RainbowMinerClient" = "reference/client.md" },
        { "SyncRainbowMinerClient" = "reference/sync-client.md" },
        { "Models" = [
            { "Common models" = "reference/models/common.md" },
            { "Miner models" = "reference/models/miners.md" },
            { "Pool models" = "reference/models/pools.md" },
            { "Device models" = "reference/models/devices.md" },
            { "Balance & earnings" = "reference/models/balances.md" },
            { "Config models" = "reference/models/config.md" },
            { "Console models" = "reference/models/console.md" },
            { "Activity models" = "reference/models/activity.md" },
            { "MRR models" = "reference/models/mrr.md" },
            { "Misc models" = "reference/models/misc.md" },
        ] },
        { "Errors" = "reference/errors.md" },
    ] },
]

# Extra CSS
extra_css = ["stylesheets/extra.css"]

# --------------------------------------------------------------------------- #
# Theme
# --------------------------------------------------------------------------- #
[project.theme]
variant = "modern"
custom_dir = "overrides"
language = "en"

features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.path",
    "navigation.sections",
    "navigation.tabs",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "amber"
accent = "deep-orange"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "amber"
accent = "orange"
toggle.icon = "lucide/moon-star"
toggle.name = "Switch to system preference"

[project.theme.icon]
tag.default = "lucide/hash"

# --------------------------------------------------------------------------- #
# Plugins
# --------------------------------------------------------------------------- #
[project.plugins.search]

[project.plugins.tags]

[project.plugins.mkdocstrings]
# mkdocstrings Python handler — generates API reference from source docstrings
[project.plugins.mkdocstrings.config]
enabled = true

[project.plugins.mkdocstrings.config.handlers.python]
paths = ["src"]
inventories = ["https://docs.python.org/3/objects.inv"]

[project.plugins.mkdocstrings.config.handlers.python.options]
docstring_style = "google"
inherited_members = true
show_source = false
show_root_heading = true
show_root_full_path = true
members_order = "source"
unwrap_init_docstring = true
merge_init_into_class = true
separate_signature = true
show_signature_annotations = true
signature_cross_refs = true
heading_level = 2

# --------------------------------------------------------------------------- #
# Markdown extensions
# --------------------------------------------------------------------------- #
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.pymdownx.betterem]
smart_enable = "all"

[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]

[project.markdown_extensions.pymdownx.magiclink]
normalize_issue_symbols = true
repo_url_shorthand = true
user = "El1t3Mult1pl3x0r"
repo = "rainbowminer-api-client"

[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.pymdownx.tilde]
