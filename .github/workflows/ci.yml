name: CI

"on":
  pull_request:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "AGENTS.md"
      - "LICENSE"
      - ".gitignore"
      - ".python-version"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  quality:
    name: Lint, type-check, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Sync environment
        run: uv sync

      - name: Check formatting (ruff format)
        run: uv run ruff format --check

      - name: Lint (ruff check)
        run: uv run ruff check

      - name: Type check (ty)
        run: uv run ty check

      - name: Docstring check (pydoclint)
        run: uv run pydoclint src tests

      - name: Run tests (pytest)
        run: uv run pytest -m "not live"

  build:
    name: Build distribution artifacts
    needs: quality
    runs-on: ubuntu-latest
    # CI only runs on pull requests to main
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Sync environment
        run: uv sync

      - name: Build sdist + wheel
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
